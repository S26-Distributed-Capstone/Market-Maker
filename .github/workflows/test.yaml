name: "Test"
on:
    pull_request:
        branches: [ main ]
    push:
        branches: [ main ]
jobs:
    test:
        name: Test and Report
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up JDK
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'temurin'
                cache: maven
            - name: Run tests
              run: mvn test
            - name: Create test summary
              uses: test-summary/action@dist
              with:
                paths: target/surefire-reports/*.xml
              if: always()
