services:
  exchange:
    build: .
    image: market-maker:latest
    environment:
      - SPRING_PROFILES_ACTIVE=exchange
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  external-order-publisher:
    build: .
    image: market-maker:latest
    environment:
      - SPRING_PROFILES_ACTIVE=external-publisher
    depends_on:
      exchange:
        condition: service_healthy

  postgres:
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=marketmaker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketmaker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s