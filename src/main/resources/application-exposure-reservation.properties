# Exposure Reservation Service Configuration
spring.application.name=exposure-reservation-service
server.port=8080


# Logging
logging.level.edu.yu.marketmaker.exposurereservation=DEBUG
logging.level.root=INFO

# Health check endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# High-availability config
ha.zookeeper.connect=${HA_ZOOKEEPER_CONNECT:zookeeper:2181}
ha.service.name=exposure-reservation
ha.advertise.host=${HOSTNAME:localhost}

# RSocket port — needed because Exchange's ReservationRequester now calls
# exposure-reservation over RSocket. You'll also need to add an
# @MessageMapping("reservations") handler to ExposureReservationAPI
# (or a sibling class) — see "Optional" section below.
spring.rsocket.server.port=7000