# Market-Maker Node Configuration
spring.application.name=market-maker-node
server.port=8080


# Market-making configuration
# Symbols are now distributed by the cluster coordinator; the seed list lives in /config/symbols.txt
marketmaker.quote-refresh-interval-ms=1000
marketmaker.spread-bps=10

# Cluster / ZooKeeper coordination
cluster.zookeeper-connect=${ZOOKEEPER_CONNECT:zookeeper:2181}
cluster.zk-base-path=/marketmaker
cluster.symbols-seed-file=/config/symbols.txt
cluster.session-timeout-ms=10000
cluster.connection-timeout-ms=5000

# Logging
logging.level.edu.yu.marketmaker=DEBUG
logging.level.root=INFO

# Health check endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# RSocket target for exposure reservation service
marketmaker.exposure-reservation.host=exposure-reservation
marketmaker.exposure-reservation.port=7000

# Quote generation defaults
marketmaker.default-quote-quantity=10
marketmaker.target-spread=0.10
